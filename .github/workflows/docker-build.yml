name: Build and Push Docker Image

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. 设置 QEMU: 这是构建 arm64 镜像的关键，它允许在 x86 机器上模拟其他架构
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 2. 设置 Docker Buildx: 启用多架构构建能力
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. 生成版本号: 使用 日期 + 短 Git 哈希 (例如 2026.04.19-a1b2c3d)
      - name: Generate Version
        id: vars
        run: |
          echo "tag=$(date +'%Y.%m.%d')-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      # 4. 登录到 GitHub Container Registry
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 5. 构建并推送
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          # 同时构建 amd64 (普通电脑) 和 arm64 (苹果芯片/部分服务器)
          platforms: linux/amd64,linux/arm64
          push: true
          # 传入版本号给 Dockerfile (如果你需要的话)
          build-args: |
            VERSION=${{ steps.vars.outputs.tag }}
          # 同时打上 latest 和 具体的日期版本 标签
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.vars.outputs.tag }}
